# Learn more about configuring your app at https://shopify.dev

client_id = "577e22365f752ca97a295f78505e37a9"
application_url = "https://seed-plumbing-encoding-transportation.trycloudflare.com"
embedded = true
name = "image-merger"

[access_scopes]
# Learn more at https://shopify.dev#access_scopes
scopes = "write_products,write_metaobjects,write_metaobject_definitions,write_app_proxy"

[product.metafields.app.demo_info]
type = "single_line_text_field"
name = "Demo Source Info"
description = "Tracks products created by the Shopify app template for development"

  [product.metafields.app.demo_info.access]
  admin = "merchant_read_write"

[metaobjects.app.example]
name = "Example"
description = "An example metaobject definition created by this template"

  [metaobjects.app.example.access]
  admin = "merchant_read_write"

[metaobjects.app.example.fields.title]
name = "Title"
type = "single_line_text_field"
required = true

[metaobjects.app.example.fields.description]
name = "Description"
type = "multi_line_text_field"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://seed-plumbing-encoding-transportation.trycloudflare.com/auth/callback", 
  "https://seed-plumbing-encoding-transportation.trycloudflare.com/auth/shopify/callback"
]

[build]
automatically_update_urls_on_dev = true

[app_proxy]
url = "https://seed-plumbing-encoding-transportation.trycloudflare.com"
subpath = "image-merger"
prefix = "apps"
 